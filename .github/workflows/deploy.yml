name: Deploy to DO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Debug SSH Key
        run: |
          if [ -z "${{ secrets.DO_SSH_KEY }}" ]; then
            echo "❌ SSH KEY VACIA"
            exit 1
          else
            echo "✅ SSH KEY CARGADA"
          fi
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/misionforasteros
            git pull origin main
            docker compose down
            docker compose up -d --build